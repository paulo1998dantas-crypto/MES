<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login</title>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
        <h1 class="text-xl font-black text-slate-800 mb-2">Acesso ao Sistema</h1>
        <p class="text-sm text-slate-500 mb-6">Entre com seu usuario e senha.</p>
        {% if erro %}
        <div class="mb-4 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700">
            {{ erro }}
        </div>
        {% endif %}
        <form method="post" action="/login" class="space-y-4">
            <input type="text" name="login" placeholder="Login"
                   value="{{ login_value or '' }}"
                   class="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
            <input type="password" name="senha" placeholder="Senha"
                   class="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
            <button type="submit" class="w-full py-3 bg-blue-600 text-white rounded-2xl font-bold">ENTRAR</button>
        </form>
    </div>
</body>
</html>
